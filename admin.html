<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create and customize your surprise link with the Admin Dashboard.">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Dashboard - Surprise Portfolio</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container admin-container">
        <div class="card">
            <div class="header">
                <span class="emoji">⚙️</span>
                <h1>Admin Dashboard</h1>
                <p>Create and customize your surprise link.</p>
            </div>

            <form id="adminForm">
                <div class="form-group">
                    <label for="questionInput">Your Question:</label>
                    <textarea id="questionInput" placeholder="e.g., What is our special date?" required></textarea>
                </div>

                <div class="form-group">
                    <label for="devEmailInput">Formspree Form ID (Optional):</label>
                    <input type="text" id="devEmailInput" placeholder="e.g., xbjvqjgw">
                    <small>Create a free endpoint at Formspree.io and paste the short ID here to receive
                        answers.</small>
                </div>

                <div class="form-group">
                    <label for="secretLinkInput">Surprise Link (URL):</label>
                    <input type="url" id="secretLinkInput" placeholder="https://example.com/surprise" required>
                </div>

                <button type="submit" id="saveBtn">Generate Shareable Link</button>
                <p id="adminMessage" class="message"></p>

                <div id="shareableLinkSection" class="hidden">
                    <div class="form-group">
                        <label for="shareableLink">Share this link with your friend:</label>
                        <div class="input-group link-display">
                            <input type="text" id="shareableLink" readonly>
                            <button type="button" id="copyBtn" class="mini-btn">Copy</button>
                        </div>
                    </div>
                </div>

                <div class="nav-links">
                    <a href="index.html" class="secondary-btn">Preview Page</a>
                </div>
            </form>
        </div>
    </div>
    <script src="admin.js"></script>
</body>

</html>
