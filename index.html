<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A special interactive surprise awaits you! Unlock it now.">
    <meta name="keywords" content="surprise, gift, interactive, special">
    <meta name="author" content="Surprise Portfolio">
    <meta property="og:title" content="Surprise For You! 🎁">
    <meta property="og:description" content="A special interactive surprise awaits you! Unlock it now.">
    <meta property="og:type" content="website">
    <title>Surprise For You! 🎁</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card" id="surpriseCard">
            <div class="header">
                <span class="emoji">🎁</span>
                <h1>A Special Surprise</h1>
            </div>
            
            <div class="content" id="questionArea">
                <p id="questionText">Loading surprise question...</p>
                <div class="input-group">
                    <input type="text" id="answerInput" placeholder="Type your response here..." autocomplete="off">
                </div>
                <button id="unlockBtn">Unlock Surprise</button>
                <p id="message" class="message"></p>
            </div>

            <div class="content hidden" id="linkArea">
                <div class="success-icon">✨</div>
                <h2>Surprise Unlocked!</h2>
                <p>Click the link below to see what's waiting for you:</p>
                <a id="secretAnchor" href="#" target="_blank" class="surprise-link">
                    🎉 Click for Your Surprise!
                </a>
                <button id="resetBtn" class="secondary-btn">Try Another Answer</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
